.header{padding:20px 24px 12px;border-bottom:1px solid var(--border)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.card.bullish{border-left:3px solid var(--green)}

.ct{display:flex;flex-direction:column;gap:2px}
.ck{font-size:15px;font-weight:800;letter-spacing:.04em}

.badge{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700}
.bgc{background:rgba(245,158,11,.2);color:var(--gold);border:1px solid rgba(245,158,11,.4)}

.pr{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
.ch2{font-size:13px;font-weight:600}
.up{color:var(--green)}.down{color:var(--red)}
.ra{padding:0 16px 10px;display:flex;align-items:center;gap:12px}
.rw{position:relative;width:64px;height:36px;flex-shrink:0}
.rv{position:absolute;bottom:0;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;white-space:nowrap}
.ri{display:flex;flex-direction:column;gap:2px}
.rl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.rs{font-size:11px;font-weight:600}
.rh{color:var(--red)}.rc{color:var(--blue)}.rn{color:var(--muted)}
.mets{display:flex;gap:16px}
.met{display:flex;flex-direction:column;gap:2px}
.ml{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.mv{font-size:12px;font-weight:600}
.cl{font-size:9px;color:var(--muted);padding:0 16px 2px;text-transform:uppercase;letter-spacing:.06em}
.cw{padding:0 12px 8px;height:100px}
.mw{padding:0 12px 10px;height:60px}
.ns{border-top:1px solid var(--border);padding:10px 16px 12px}
.nt{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.ni{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px}
.nst{padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px}
.sp{background:rgba(34,197,94,.2);color:var(--green)}
.sn{background:rgba(239,68,68,.2);color:var(--red)}
.su{background:rgba(107,107,128,.2);color:var(--muted)}
.nx{font-size:11px;color:#c0c0d0;line-height:1.4}

function buildHM() {
  const c = document.getElementById('hm');
  S.forEach(s => {
    const p = s.change_pct;
    const intensity = Math.min(Math.abs(p) / 10, 1);
    let bg, col;
    if (p > 0) {
      const g = Math.round(80 + intensity * 117);
      bg = `rgba(34,${g},94,${0.15 + intensity * 0.55})`;
      col = `rgb(34,${g},94)`;
    } else {
      const r = Math.round(180 + intensity * 75);
      bg = `rgba(${r},68,68,${0.15 + intensity * 0.55})`;
      col = `rgb(${r},68,68)`;
    }
    const el = document.createElement('div');
    el.className = 'hm-cell';
    el.style.cssText = `background:${bg};color:${col}`;
    el.innerHTML = `<span class="hm-t">${s.ticker}</span><span class="hm-p">${p > 0 ? '+' : ''}${p.toFixed(1)}%</span>`;
    c.appendChild(el);
  });
}

function drawGauge(canvas, rsi) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  const cx = w / 2, cy = h - 2, r = h - 6;
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, 0);
  ctx.strokeStyle = '#2a2a35';
  ctx.lineWidth = 5;
  ctx.stroke();
  const angle = Math.PI + (rsi / 100) * Math.PI;
  let color = '#6b6b80';
  if (rsi >= 70) color = '#ef4444';
  else if (rsi <= 30) color = '#3b82f6';
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, angle);
  ctx.strokeStyle = color;
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.stroke();
}

        <div class="mets" style="margin-left:auto">
          <div class="met"><span class="ml">出来高比</span><span class="mv" style="color:${vcol}">${vr}x</span></div>
          <div class="met"><span class="ml">MACD</span><span class="mv" style="color:${hcol}">${hsg}${s.hist_val}</span></div>
        </div>
      </div>
      <div class="cl">価格 / MA25 / MA75</div>
      <div class="cw"><canvas id="pc${idx}"></canvas></div>
      <div class="cl">MACD</div>
      <div class="mw"><canvas id="mc${idx}"></canvas></div>
      ${newsHtml.length > 0 ? `<div class="ns"><div class="nt">最新ニュース</div>${newsHtml}</div>` : ''}
    `;
    grid.appendChild(card);
  });

  S.forEach((s, idx) => {
    drawGauge(document.getElementById('rsi' + idx), s.rsi);

    const gcPts = s.chart_close.map((v, i) => { const m = s.cross_markers.find(c => c.idx === i && c.type === 'GC'); return m ? v : null; });
    const dcPts = s.chart_close.map((v, i) => { const m = s.cross_markers.find(c => c.idx === i && c.type === 'DC'); return m ? v : null; });

    new Chart(document.getElementById('pc' + idx).getContext('2d'), {
      type: 'line',
      data: { labels: s.chart_dates, datasets: [
        { data: s.chart_close, borderColor: '#6b7cff', borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
        { data: s.chart_ma25, borderColor: '#f59e0b', borderWidth: 1, pointRadius: 0, tension: 0.3 },
        { data: s.chart_ma75, borderColor: '#a855f7', borderWidth: 1, pointRadius: 0, tension: 0.3, borderDash: [4,3] },
        { data: gcPts, borderColor: 'transparent', backgroundColor: '#f59e0b', pointRadius: 6, pointStyle: 'triangle', showLine: false },
        { data: dcPts, borderColor: 'transparent', backgroundColor: '#9ca3af', pointRadius: 6, pointStyle: 'triangle', rotation: 180, showLine: false },
      ]},
      options: { responsive: true, maintainAspectRatio: false, animation: false,
        plugins: { legend: { display: false } },
        scales: { x: { display: false }, y: { display: true, position: 'right', grid: { color: '#1e1e24' }, ticks: { color: '#6b6b80', font: { size: 9 }, maxTicksLimit: 4, callback: v => '$' + v.toLocaleString() } } }
      }
    });

    const hc = s.chart_hist.map(v => v >= 0 ? 'rgba(34,197,94,0.7)' : 'rgba(239,68,68,0.7)');
    new Chart(document.getElementById('mc' + idx).getContext('2d'), {
      type: 'bar',
      data: { labels: s.chart_dates, datasets: [
        { type: 'bar', data: s.chart_hist, backgroundColor: hc, borderWidth: 0 },
        { type: 'line', data: s.chart_macd, borderColor: '#3b82f6', borderWidth: 1.2, pointRadius: 0, tension: 0.3 },
        { type: 'line', data: s.chart_signal, borderColor: '#f59e0b', borderWidth: 1, pointRadius: 0, tension: 0.3, borderDash: [3,2] },
      ]},
      options: { responsive: true, maintainAspectRatio: false, animation: false,
        plugins: { legend: { display: false } },
        scales: { x: { display: false }, y: { display: false } }
      }
    });
  });
}

buildHM();
buildCards();
</script>
</body>
</html>
